<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hefestos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; display: flex; height: 100vh; }
    #sidebar { width: 280px; background: #16213e; display: flex; flex-direction: column; border-right: 1px solid #0f3460; }
    #sidebar-header { padding: 16px; border-bottom: 1px solid #0f3460; display: flex; justify-content: space-between; align-items: center; }
    #sidebar-header h2 { font-size: 18px; color: #e94560; }
    #new-session { background: #e94560; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
    #new-session:hover { background: #d63851; }
    #session-list { flex: 1; overflow-y: auto; padding: 8px; }
    .session-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
    .session-item:hover { background: #1f3468; }
    .session-item.active { background: #0f3460; }
    .session-item .delete-btn { visibility: hidden; background: none; border: none; color: #e94560; cursor: pointer; font-size: 16px; padding: 0 4px; }
    .session-item:hover .delete-btn { visibility: visible; }
    #main { flex: 1; display: flex; flex-direction: column; }
    #header { padding: 16px; border-bottom: 1px solid #0f3460; font-size: 16px; color: #aaa; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; }
    .msg { margin-bottom: 16px; max-width: 80%; }
    .msg.user { margin-left: auto; }
    .msg.assistant { margin-right: auto; }
    .msg .role { font-size: 12px; color: #888; margin-bottom: 4px; font-weight: 600; }
    .msg.user .role { text-align: right; }
    .msg .content { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .msg.user .content { background: #e94560; color: #fff; }
    .msg.assistant .content { background: #16213e; color: #eee; border: 1px solid #0f3460; }
    .msg .content.loading { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    #input-area { padding: 16px; border-top: 1px solid #0f3460; display: flex; gap: 8px; }
    #input-area textarea { flex: 1; background: #16213e; border: 1px solid #0f3460; color: #eee; padding: 10px; border-radius: 8px; resize: none; font-size: 14px; font-family: inherit; height: 48px; outline: none; }
    #input-area textarea:focus { border-color: #e94560; }
    #input-area button { background: #e94560; color: #fff; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    #input-area button:hover { background: #d63851; }
    #input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
    .empty-state { display: flex; align-items: center; justify-content: center; height: 100%; color: #555; font-size: 18px; }
    .tool-part { background: #0f3460; padding: 4px 8px; border-radius: 4px; margin: 4px 0; font-size: 12px; color: #7ec8e3; }
    .error-banner { background: #441111; color: #ff6b6b; padding: 8px 16px; font-size: 13px; display: none; }
  </style>
</head>
<body>
  <div id="sidebar">
    <div id="sidebar-header"><h2>Hefestos</h2><button id="new-session">+ Nova</button></div>
    <div id="session-list"></div>
  </div>
  <div id="main">
    <div id="header">Selecione ou crie uma sessão</div>
    <div id="error-banner" class="error-banner"></div>
    <div id="messages"><div class="empty-state">Selecione uma sessão para começar</div></div>
    <div id="input-area"><textarea id="prompt" placeholder="Envie uma mensagem..." disabled></textarea><button id="send-btn" disabled>Enviar</button></div>
  </div>

  <script>
    const API = '';
    let currentSessionId = null;
    let pollingInterval = null;
    let knownMessageIds = new Set();
    let loadingMessages = false;

    const $ = id => document.getElementById(id);

    function showError(msg) { const b = $('error-banner'); b.textContent = msg; b.style.display = msg ? 'block' : 'none'; }

    async function api(method, path, body) {
      const opts = { method, headers: {} };
      if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
      const res = await fetch(API + path, opts);
      if (res.status === 204) return null;
      const text = await res.text();
      if (!res.ok) {
        throw new Error(`${res.status}: ${text || res.statusText}`);
      }
      if (!text) return null;
      try { return JSON.parse(text); } catch (e) {
        throw new Error(`Resposta inválida: ${text.slice(0, 100)}`);
      }
    }

    async function loadSessions() {
      try {
        const sessions = await api('GET', '/session');
        const list = $('session-list');
        list.innerHTML = '';
        sessions.forEach(s => {
          const div = document.createElement('div');
          div.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
          div.innerHTML = `<span>${s.title || s.id.slice(0, 8)}</span><button class="delete-btn">&times;</button>`;
          div.querySelector('span').onclick = () => selectSession(s.id, s.title);
          div.querySelector('.delete-btn').onclick = (e) => { e.stopPropagation(); deleteSession(s.id); };
          list.appendChild(div);
        });
      } catch (e) {}
    }

    async function createSession() {
      showError('');
      try {
        const session = await api('POST', '/session', { title: 'Nova conversa' });
        if (session) {
          currentSessionId = session.id;
          knownMessageIds.clear();
          $('header').textContent = session.title || session.id.slice(0, 8);
          $('messages').innerHTML = '';
          $('prompt').disabled = false;
          $('send-btn').disabled = false;
          await loadSessions();
        }
      } catch (e) {}
    }

    async function selectSession(id, title) {
      showError('');
      try {
        currentSessionId = id;
        knownMessageIds.clear();
        $('header').textContent = title || id.slice(0, 8);
        $('messages').innerHTML = '<div class="empty-state">Carregando...</div>';
        $('prompt').disabled = false;
        $('send-btn').disabled = false;
        await loadMessages();
        await loadSessions();
      } catch (e) {}
    }

    async function deleteSession(id) {
      await api('DELETE', `/session/${id}`);
      if (id === currentSessionId) {
        currentSessionId = null;
        knownMessageIds.clear();
        $('header').textContent = 'Selecione ou crie uma sessão';
        $('messages').innerHTML = '<div class="empty-state">Selecione uma sessão para começar</div>';
        $('prompt').disabled = true;
        $('send-btn').disabled = true;
      }
      await loadSessions();
    }

    async function loadMessages() {
      if (!currentSessionId || loadingMessages) return;
      loadingMessages = true;
      try {
        const msgs = await api('GET', `/session/${currentSessionId}/message?limit=50`);
        const container = $('messages');
        let needsScroll = container.scrollTop + container.clientHeight >= container.scrollHeight - 10;

        msgs.forEach(msg => {
          const mid = msg.info.id;
          if (knownMessageIds.has(mid)) {
            const existing = container.querySelector(`[data-id="${mid}"]`);
            if (existing) updateMessageDiv(existing, msg);
            return;
          }
          knownMessageIds.add(mid);
          const div = createMessageDiv(msg);
          container.appendChild(div);
        });

        if (needsScroll) container.scrollTop = container.scrollHeight;
        if (msgs.length === 0 && container.querySelector('.empty-state')) {
          container.innerHTML = '';
        }
      } catch (e) {
        loadingMessages = false;
        return;
      }
      loadingMessages = false;
      startPolling();
    }

    function createMessageDiv(msg) {
      const div = document.createElement('div');
      div.className = `msg ${msg.info.role}`;
      div.setAttribute('data-id', msg.info.id);
      updateMessageDiv(div, msg);
      return div;
    }

    function updateMessageDiv(div, msg) {
      const role = msg.info.role === 'user' ? 'Você' : 'Hefestos';
      let textParts = [];
      let toolParts = [];
      let stopPart = false;

      (msg.parts || []).forEach(p => {
        if (p.type === 'text') textParts.push(p.text);
        else if (p.type === 'stop') stopPart = true;
        else if (p.type && p.type !== 'text') toolParts.push(`[${p.type}]`);
      });

      let html = `<div class="role">${role}</div>`;
      if (textParts.length > 0) {
        html += `<div class="content${!stopPart ? ' loading' : ''}">${escapeHtml(textParts.join(''))}</div>`;
      } else if (toolParts.length > 0) {
        html += `<div class="content${!stopPart ? ' loading' : ''}">${toolParts.join(' ')}</div>`;
      } else if (!stopPart) {
        html += `<div class="content loading">Pensando...</div>`;
      }
      div.innerHTML = html;
    }

    function escapeHtml(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    async function sendMessage() {
      const textarea = $('prompt');
      const text = textarea.value.trim();
      if (!text || !currentSessionId) return;

      showError('');
      textarea.value = '';
      $('send-btn').disabled = true;
      textarea.disabled = true;

      try {
        await api('POST', `/session/${currentSessionId}/prompt_async`, {
          parts: [{ type: 'text', text }]
        });
        await loadMessages();
      } catch (e) {
        $('send-btn').disabled = false;
        textarea.disabled = false;
      }
    }

    function startPolling() {
      clearInterval(pollingInterval);
      if (!currentSessionId) return;
      pollingInterval = setInterval(async () => {
        if (loadingMessages || document.hidden) return;
        await loadMessages();
        $('send-btn').disabled = false;
        $('prompt').disabled = false;
      }, 2000);
    }

    $('new-session').onclick = createSession;
    $('send-btn').onclick = sendMessage;
    $('prompt').onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
    document.addEventListener('visibilitychange', () => { if (!document.hidden && currentSessionId) loadMessages(); });

    loadSessions();
  </script>
</body>
</html>

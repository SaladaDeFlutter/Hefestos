<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hefestos Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; padding: 24px; max-width: 800px; margin: 0 auto; }
    h1 { color: #e94560; margin-bottom: 24px; }
    .card { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
    .card h3 { margin-bottom: 12px; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 13px; color: #aaa; margin-bottom: 4px; }
    .form-group input, .form-group select { width: 100%; padding: 8px 12px; background: #1a1a2e; border: 1px solid #0f3460; color: #eee; border-radius: 6px; font-size: 14px; outline: none; }
    .form-group input:focus, .form-group select:focus { border-color: #e94560; }
    .row { display: flex; gap: 12px; }
    .row .form-group { flex: 1; }
    button { background: #e94560; color: #fff; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; }
    button:hover { background: #d63851; }
    .config-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #0f3460; font-size: 14px; }
    .config-item:last-child { border-bottom: none; }
    .config-item .delete { background: none; border: none; color: #e94560; cursor: pointer; font-size: 18px; padding: 0 4px; }
    .provider-tag { background: #0f3460; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    .empty { color: #555; text-align: center; padding: 24px; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: #e94560; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 14px; display: none; }
  </style>
</head>
<body>
  <h1>Hefestos Admin</h1>

  <div class="card">
    <h3>Adicionar Servidor Discord</h3>
    <form id="config-form">
      <div class="row">
        <div class="form-group">
          <label>ID do Servidor (Guild ID)</label>
          <input name="guild_id" required placeholder="Ex: 123456789012345678" />
        </div>
        <div class="form-group">
          <label>Nome do Servidor</label>
          <input name="guild_name" placeholder="Meu Servidor" />
        </div>
      </div>
      <div class="row">
        <div class="form-group">
          <label>Provider</label>
          <select name="provider">
            <option value="deepseek">DeepSeek</option>
            <option value="openai">OpenAI</option>
            <option value="anthropic">Anthropic</option>
            <option value="google">Google (Gemini)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Modelo</label>
          <input name="model" value="deepseek/deepseek-v4-flash" placeholder="deepseek/deepseek-v4-flash" />
        </div>
      </div>
      <div class="form-group">
        <label>Chave de API (API Key)</label>
        <input name="api_key" required placeholder="sk-..." type="password" />
      </div>
      <div class="form-group">
        <label>Token do Bot Discord</label>
        <input name="discord_token" placeholder="MTIzNDU2..." type="password" />
      </div>
      <button type="submit">Salvar Configuracao</button>
    </form>
  </div>

  <div class="card">
    <h3>Servidores Configurados</h3>
    <div id="config-list"><div class="empty">Nenhum servidor configurado</div></div>
  </div>

  <div class="card">
    <h3>Status</h3>
    <p style="font-size:14px;color:#aaa;">API: <span id="api-status">verificando...</span></p>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const form = document.getElementById('config-form');
    const list = document.getElementById('config-list');

    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 3000);
    }

    async function loadConfigs() {
      try {
        const res = await fetch('/admin/api/configs');
        const configs = await res.json();
        if (configs.length === 0) {
          list.innerHTML = '<div class="empty">Nenhum servidor configurado</div>';
        } else {
          list.innerHTML = configs.map(c => `
            <div class="config-item">
              <div>
                <strong>${c.guild_name || c.guild_id}</strong>
                <span class="provider-tag">${c.provider}</span>
                <span style="color:#aaa;font-size:12px;">${c.model}</span>
              </div>
              <button class="delete" onclick="remove('${c.guild_id}')">&times;</button>
            </div>
          `).join('');
        }
      } catch (e) {
        list.innerHTML = '<div class="empty">Erro ao carregar</div>';
      }
    }

    async function remove(guildId) {
      if (!confirm('Remover configuracao deste servidor?')) return;
      await fetch(`/admin/api/configs/${guildId}`, { method: 'DELETE' });
      toast('Servidor removido');
      loadConfigs();
    }

    form.onsubmit = async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(form));
      if (data.provider === 'deepseek' && !data.model) data.model = 'deepseek/deepseek-v4-flash';
      await fetch('/admin/api/configs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      toast('Configuracao salva!');
      form.reset();
      loadConfigs();
    };

    fetch('/admin/api/health').then(r => r.json()).then(d => {
      document.getElementById('api-status').textContent = 'online';
      document.getElementById('api-status').style.color = '#4ecca3';
    }).catch(() => {
      document.getElementById('api-status').textContent = 'offline';
      document.getElementById('api-status').style.color = '#e94560';
    });

    loadConfigs();
  </script>
</body>
</html>
